name: Delete archive links in comments

on:
  issue_comment:
    types: [created, edited]

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  delete-archive-comments:
    runs-on: ubuntu-latest

    steps:
      - name: Delete comments containing archive links
        uses: actions/github-script@v7
        with:
          script: |
            const comment = context.payload.comment;
            if (!comment) return;

            const body = comment.body || '';
            const login = comment.user?.login || '';
            const association = comment.author_association || '';

            const trusted = new Set([
              'OWNER',
              'MEMBER',
              'COLLABORATOR'
            ]);

            if (trusted.has(association)) {
              core.info(`Skipping trusted author: ${login} (${association})`);
              return;
            }

            const archiveExt =
              '(?:tar\\.gz|tar\\.bz2|tar\\.xz|zip|rar|7z|tar|gz|tgz|bz2|xz|cab|iso)';

            const markdownArchiveLink = new RegExp(
              String.raw`\[[^\]\r\n]{1,300}\.${archiveExt}\]\(\s*https?:\/\/[^)\s]+\s*\)`,
              'i'
            );

            const directArchiveLink = new RegExp(
              String.raw`https?:\/\/[^\s<>()]+\.${archiveExt}(?:[?#][^\s<>()]*)?`,
              'i'
            );

            const markdownNamedArchive = new RegExp(
              String.raw`\[[^\]\r\n]{1,300}\.${archiveExt}\]\(`,
              'i'
            );

            const hasArchiveLink =
              markdownArchiveLink.test(body) ||
              directArchiveLink.test(body) ||
              markdownNamedArchive.test(body);

            if (!hasArchiveLink) {
              core.info('No archive link detected.');
              return;
            }

            await github.rest.issues.deleteComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: comment.id
            });

            core.warning(
              `Deleted comment from ${login} because it contained an archive link.`
            );
